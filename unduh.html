<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unduhan Surat Keterangan TOEFL</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --surface: #ffffff;
        --ink: #18202a;
        --muted: #5b6673;
        --line: #d9dee7;
        --accent: #0f766e;
        --accent-dark: #115e59;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 560px);
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 48px rgba(24, 32, 42, 0.08);
        padding: clamp(22px, 5vw, 38px);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(26px, 5vw, 38px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 22px;
      }

      a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        padding: 10px 14px;
        background: var(--accent);
        color: white;
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        background: var(--accent-dark);
      }

      .secondary {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Unduhan Surat Keterangan TOEFL</h1>
      <p>
        Dokumen Surat Keterangan Pembebasan Syarat Skor Minimal TOEFL Fakultas
        Teknik Universitas Mulawarman tersedia dalam format DOCX. Silakan tekan
        tombol di bawah untuk mengunduh dokumen.
      </p>

      <div class="actions">
        <a id="download" download>Unduh Dokumen</a>
        <a class="secondary" href="./">Kembali ke QR</a>
      </div>
    </main>

    <script>
      const fileName = "surat-keterangan-toefl-ft-unmul.docx";
      const fileUrl = new URL(fileName, window.location.href).toString();

      document.getElementById("download").href = fileUrl;
    </script>
  </body>
</html>
